<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0C0E14"/>
      <stop offset="1" stop-color="#0F1520"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#0B5FFF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#0B5FFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <!-- top accent: blue | red -->
  <rect x="0" y="0" width="600" height="4" fill="#0B5FFF"/>
  <rect x="600" y="0" width="600" height="4" fill="#E63946"/>

  <!-- Name -->
  <text x="600" y="138" font-size="72" font-weight="800" fill="#EDEDEF" text-anchor="middle" letter-spacing="-1">Julien Engelhard</text>

  <!-- Title -->
  <text x="600" y="184" font-size="28" font-weight="600" fill="#C8CDD6" text-anchor="middle" xml:space="preserve"><tspan fill="#3A7FFF">DevSecOps</tspan> Architect &amp; Consultant</text>

  <!-- Positioning line -->
  <text x="600" y="230" font-size="15" font-weight="600" fill="#5C5C5F" text-anchor="middle" letter-spacing="3.5">FOUNDER OF SWISSONELAB   ·   GENEVA, SWITZERLAND</text>

  <rect x="0" y="297" width="1200" height="3" fill="#131A2B"/>
</svg>
