<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0C0E14"/>
      <stop offset="1" stop-color="#0F1520"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0B5FFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#0B5FFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- top accent: blue | red -->
  <rect x="0" y="0" width="600" height="4" fill="#0B5FFF"/>
  <rect x="600" y="0" width="600" height="4" fill="#E63946"/>

  <circle cx="150" cy="150" r="140" fill="url(#glow)"/>

  <!-- Founder monogram (brand red rounded square + JE) -->
  <g transform="translate(80,82) scale(1.55)">
    <rect x="0" y="0" width="90" height="90" rx="18" fill="#DC2626"/>
  </g>
  <text x="150" y="173" font-size="58" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">JE</text>

  <!-- Divider -->
  <rect x="300" y="78" width="2" height="144" fill="#1E293B"/>

  <!-- Name -->
  <text x="338" y="142" font-size="66" font-weight="800" fill="#EDEDEF" letter-spacing="-1">Julien Engelhard</text>

  <!-- Title -->
  <text x="340" y="190" font-size="27" font-weight="600" fill="#C8CDD6" xml:space="preserve"><tspan fill="#3A7FFF">DevSecOps</tspan> Architect &amp; Consultant</text>

  <!-- Positioning line -->
  <text x="342" y="234" font-size="15" font-weight="600" fill="#5C5C5F" letter-spacing="3" xml:space="preserve">FOUNDER OF SWISSONELAB   —   PLATFORM · SECURITY · AUTOMATION · AI</text>

  <rect x="0" y="297" width="1200" height="3" fill="#131A2B"/>
</svg>
